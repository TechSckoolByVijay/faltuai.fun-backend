name: Build and Push to Azure Container Registry

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: faltuaicr.azurecr.io
  IMAGE_NAME: faltuai-backend
  CONTAINER_APP_NAME: faltuai
  RESOURCE_GROUP: falutuai.fun
  CONTAINER_APP_ENVIRONMENT: managedEnvironment-falutuaifun-bd2b

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ github.run_id }}
          labels: |
            build-id=${{ github.run_id }}

      - name: Output image details
        run: |
          echo "### 🐳 Docker Image Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Build ID:** \`${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`build-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull Command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo 'docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ github.run_id }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy-to-container-apps:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "🚀 Installing Container Apps extension and updating app..."
            
            # Install Container Apps extension with latest version
            az extension add --name containerapp --upgrade --allow-preview true
            
            # Update container image with build ID
            echo "📦 Updating container image with build ID: ${{ github.run_id }}..."
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ github.run_id }}
            
            # Update environment variables separately to avoid API conflicts
            echo "🔧 Setting environment variables..."
            
            # Set DB URLs separately using --set-env-vars (merge, not replace) only when secrets exist.
            # --replace-env-vars below does NOT include DB URLs to avoid wiping them when secrets are unset.
            if [ -n "${{ secrets.DATABASE_URL }}" ] && [ -n "${{ secrets.ASYNC_DATABASE_URL }}" ]; then
              echo "🔑 Setting DB URLs from secrets..."
              az containerapp update \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --set-env-vars \
                  "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
                  "ASYNC_DATABASE_URL=${{ secrets.ASYNC_DATABASE_URL }}"
            else
              echo "⚠️  DATABASE_URL or ASYNC_DATABASE_URL secret not set — preserving existing DB env vars in container app"
            fi
            
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --set-env-vars \
                POSTGRES_DB="${{ secrets.POSTGRES_DB }}" \
                POSTGRES_USER="${{ secrets.POSTGRES_USER }}" \
                POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
                GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
                GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
                OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
                OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}" \
                JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
                FRONTEND_URL="https://faltooai.fun" \
                LANGCHAIN_TRACING_V2="${{ secrets.LANGCHAIN_TRACING_V2 }}" \
                LANGCHAIN_API_KEY="${{ secrets.LANGCHAIN_API_KEY }}" \
                LANGCHAIN_PROJECT="${{ secrets.LANGCHAIN_PROJECT }}" \
                LANGCHAIN_ENDPOINT="${{ secrets.LANGCHAIN_ENDPOINT }}" \
                LANGSMITH_AUTO_BATCH_TRACING="${{ secrets.LANGSMITH_AUTO_BATCH_TRACING }}" \
                AZURE_DOC_INTELLIGENCE_ENDPOINT="${{ secrets.AZURE_DOC_INTELLIGENCE_ENDPOINT }}" \
                AZURE_DOC_INTELLIGENCE_KEY="${{ secrets.AZURE_DOC_INTELLIGENCE_KEY }}" \
                YOUTUBE_API_KEY="${{ secrets.YOUTUBE_API_KEY }}" \
                GITHUB_TOKEN="${{ secrets.GH_API_TOKEN }}" \
                SERPER_API_KEY="${{ secrets.SERPER_API_KEY }}" \
                DEBUG="false" \
                ENVIRONMENT="production" \
                LOG_LEVEL="INFO"
            
            echo "✅ Container App deployment completed!"
          
      - name: Verify deployment
        uses: azure/CLI@v1
        with:
          azcliversion: 2.30.0
          inlineScript: |
            echo "🔍 Verifying Container App deployment..."

            az config set extension.use_dynamic_install=yes_without_prompt
            az extension add --name containerapp --upgrade --allow-preview true
            
            # Get app status
            APP_STATUS=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query 'properties.provisioningState' \
              --output tsv)
            
            # Get app URL
            APP_URL=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query 'properties.configuration.ingress.fqdn' \
              --output tsv)
            
            echo "📊 Deployment Status: $APP_STATUS"
            echo "🔗 Application URL: https://$APP_URL"
            
            # Test health endpoint (with timeout)
            echo "🏥 Testing health endpoint..."
            if curl -f --max-time 30 "https://$APP_URL/health"; then
              echo "✅ Health check passed"
            else
              echo "⚠️ Health check failed - app may still be starting"
            fi
            
            # Show recent logs
            echo "📋 Recent application logs:"
            az containerapp logs show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --follow false \
              --tail 20 || echo "Could not retrieve logs"

      - name: Output deployment info
        run: |
          echo "### 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Container App:** \`${{ env.CONTAINER_APP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Resource Group:** \`${{ env.RESOURCE_GROUP }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🔗 Application URL:** https://faltuai.reddune-c0e74598.centralindia.azurecontainerapps.io" >> $GITHUB_STEP_SUMMARY
          echo "**🏥 Health Check:** https://faltuai.reddune-c0e74598.centralindia.azurecontainerapps.io/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment Variables Configured:**" >> $GITHUB_STEP_SUMMARY
          echo "- Database (PostgreSQL)" >> $GITHUB_STEP_SUMMARY
          echo "- Google OAuth" >> $GITHUB_STEP_SUMMARY
          echo "- OpenAI API" >> $GITHUB_STEP_SUMMARY
          echo "- LangChain/LangSmith" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Document Intelligence" >> $GITHUB_STEP_SUMMARY
          echo "- Market Research APIs (YouTube, GitHub, Serper)" >> $GITHUB_STEP_SUMMARY
          echo "- Production settings" >> $GITHUB_STEP_SUMMARY
